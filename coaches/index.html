<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meet Our Coaches - Sharks Swim Team</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../components/component.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header"></header>

    <main class="coaches-section">
        <div class="section-title">
            <h1>MEET THE SHARKS COACHING TEAM</h1>
            <p>Expert training from seasoned professionals dedicated to pushing your limits.</p>
        </div>

        <div class="coaches-grid">
            <div class="coach-card">
                <div class="coach-image-wrapper">
                    <img src="../assets/Dive_Close.jpg" alt="Coach Placeholder" class="coach-img">
                    <div class="coach-overlay"><span>View Profile</span></div>
                </div>
                <div class="coach-info">
                    <h3 class="coach-name">Coach Alex Mercer</h3>
                    <p class="coach-age">Age: 34</p>
                    <div class="coach-traits">
                        <span class="trait-tag">Olympic Trialist</span>
                        <span class="trait-tag">10+ Yrs Exp</span>
                        <span class="trait-tag">Endurance Expert</span>
                    </div>
                </div>
            </div>

            <div class="coach-card">
                <div class="coach-image-wrapper">
                    <img src="../assets/Dive_Beginning.jpg" alt="Coach Placeholder" class="coach-img">
                    <div class="coach-overlay"><span>View Profile</span></div>
                </div>
                <div class="coach-info">
                    <h3 class="coach-name">Coach Sarah Jenkins</h3>
                    <p class="coach-age">Age: 29</p>
                    <div class="coach-traits">
                        <span class="trait-tag">Sprint Specialist</span>
                        <span class="trait-tag">Youth Mentor</span>
                        <span class="trait-tag">Drill Master</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
